name: Build OpenWrt for CMCC PZ-L8

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      upload_release:
        description: 'Upload to Release'
        required: false
        default: 'true'

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android/sdk /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev rsync swig unzip zlib1g-dev file wget python3 python3-dev python3-pyelftools python3-setuptools
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone OpenWrt source
      run: |
        cd /workdir
        git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: Apply PR #21495 (ath11k smallbuffers)
      run: |
        cd /workdir/openwrt
        curl -L "https://github.com/openwrt/openwrt/pull/21495.patch" -o /tmp/pr21495.patch || true
        if [ -s /tmp/pr21495.patch ]; then
          git apply /tmp/pr21495.patch || git apply --reject --whitespace=fix /tmp/pr21495.patch || true
        fi

    - name: Apply PR #21496 (PZ-L8 dual CPU link)
      run: |
        cd /workdir/openwrt
        curl -L "https://github.com/openwrt/openwrt/pull/21496.patch" -o /tmp/pr21496.patch || true
        if [ -s /tmp/pr21496.patch ]; then
          git apply /tmp/pr21496.patch || git apply --reject --whitespace=fix /tmp/pr21496.patch || true
        fi

    - name: Apply custom patches
      run: |
        cd /workdir/openwrt
        
        # Copy ath11k smallbuffers patch
        if [ -f "$GITHUB_WORKSPACE/package/kernel/mac80211/patches/ath11k/951-wifi-ath11k-introduct-CONFIG_ATH11K_SMALLBUFFERS.patch" ]; then
          mkdir -p package/kernel/mac80211/patches/ath11k
          cp "$GITHUB_WORKSPACE/package/kernel/mac80211/patches/ath11k/951-wifi-ath11k-introduct-CONFIG_ATH11K_SMALLBUFFERS.patch" package/kernel/mac80211/patches/ath11k/
        fi
        
        # Copy DSA patches
        mkdir -p target/linux/qualcommax/patches-6.12
        cp $GITHUB_WORKSPACE/target/linux/qualcommax/patches-6.12/*.patch target/linux/qualcommax/patches-6.12/ 2>/dev/null || true

    - name: Update feeds
      run: |
        cd /workdir/openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load configuration
      run: |
        cd /workdir/openwrt
        if [ -f "$GITHUB_WORKSPACE/config-pz-l8" ]; then
          cp "$GITHUB_WORKSPACE/config-pz-l8" .config
        fi
        make defconfig

    - name: Download dependencies
      run: |
        cd /workdir/openwrt
        make download -j$(nproc)

    - name: Build firmware
      id: compile
      run: |
        cd /workdir/openwrt
        export FORCE_UNSAFE_CONFIGURE=1
        echo "::group::Build firmware"
        make -j$(nproc) V=s || make -j1 V=s
        echo "::endgroup::"

    - name: Prepare release
      if: success()
      run: |
        cd /workdir/openwrt
        mkdir -p release/firmware
        cp -r bin/targets/qualcommax/ipq50xx/*pz-l8* release/firmware/ 2>/dev/null || true
        cp -r bin/targets/qualcommax/ipq50xx/sha256sums release/firmware/ 2>/dev/null || true
        cd release/firmware
        sha256sum * > sha256sums.txt 2>/dev/null || true
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        echo "FIRMWARE_DATE=$(date +"%Y%m%d")" >> $GITHUB_ENV
        ls -la

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: OpenWrt-PZ-L8-${{ env.FIRMWARE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}/*

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: success() && github.event.inputs.upload_release == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: PZ-L8-${{ env.FIRMWARE_DATE }}
        name: OpenWrt for CMCC PZ-L8 (${{ env.FIRMWARE_DATE }})
        body: |
          ## OpenWrt 固件 - CMCC PZ-L8

          ### 包含特性
          - PR #21495: ath11k smallbuffers (256MB 内存优化)
          - PR #21496: PZ-L8 双 CPU 链接 (2Gbps 支持)

          ### 软件包
          - 移除: DNS, DHCP, Firewall (纯 AP 模式)
          - 添加: Mesh 网络, Usteer 漫游
          - LuCI 中文界面
        files: ${{ env.FIRMWARE_PATH }}/*

    - name: Clean up old releases
      uses: dev-drprasad/delete-older-releases@v0.3.0
      if: success()
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
